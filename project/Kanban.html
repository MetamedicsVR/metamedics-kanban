function migrateCard(c) {
  return {
    id: c.id || uid(),
    column: c.column === 'backlog' ? 'defined' : c.column,
    title: c.title || '', description: c.description || '',
    type: c.type || 'task', priority: c.priority || 'medium',
    assignees: Array.isArray(c.assignees) ? c.assignees : (c.assignee ? [c.assignee] : []),
    size: c.size || '', version: c.version || c.sprint || '', module: c.module || '',
    dueDate: c.dueDate || '', links: c.links || [],
    checklist: c.checklist || [], comments: c.comments || [],
    createdAt: c.createdAt || Date.now(), archived: !!c.archived, archivedAt: c.archivedAt || null,
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) return p.map(migrateCard); }
    const v1 = localStorage.getItem(STORAGE_KEY_V1);
    if (v1) { const p = JSON.parse(v1); if (Array.isArray(p)) return p.map(migrateCard); }
    return SEED;
  } catch { return SEED; }
}

// AutoInput — text input with autocomplete suggestions
// ═══════════════════════════════════════════════════════════════════════════
function AutoInput({ value, onChange, suggestions = [], placeholder, className = '', mono = false }) {
  const [open, setOpen] = useState(false);
  const [highlight, setHighlight] = useState(0);
  const ref = useRef(null);
  const filtered = useMemo(() => {
    const q = (value || '').trim().toLowerCase();
    const base = suggestions.filter(s => s && s.toLowerCase() !== q);
    if (!q) return base.slice(0, 8);
    return base.filter(s => s.toLowerCase().includes(q)).slice(0, 8);
  }, [value, suggestions]);

  useEffect(() => {
    const onDoc = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  useEffect(() => { setHighlight(0); }, [value]);

  const choose = (s) => { onChange(s); setOpen(false); };
  const onKey = (e) => {
    if (!open || !filtered.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setHighlight(h => (h+1) % filtered.length); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setHighlight(h => (h-1+filtered.length) % filtered.length); }
    else if (e.key === 'Enter' && filtered[highlight]) { e.preventDefault(); choose(filtered[highlight]); }
    else if (e.key === 'Escape') { setOpen(false); }
  };

  return (
    <div ref={ref} className="relative">
      <input
        value={value || ''}
        onChange={e => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onKeyDown={onKey}
        placeholder={placeholder}
        className={`w-full bg-zinc-900/60 border border-zinc-800 rounded-md px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-600 ring-focus ${mono ? 'mono' : ''} ${className}`}
      />
      {open && filtered.length > 0 && (
        <div className="absolute left-0 right-0 top-full mt-1 z-30 bg-zinc-950 border border-zinc-800 rounded-md shadow-xl py-1 max-h-56 overflow-y-auto anim-up">
          {filtered.map((s, i) => (
            <button key={s} type="button" onMouseDown={(e) => { e.preventDefault(); choose(s); }}
              onMouseEnter={() => setHighlight(i)}
              className={`w-full text-left px-3 py-1.5 text-xs ${mono ? 'mono' : ''} ${i === highlight ? 'bg-zinc-900 text-indigo-300' : 'text-zinc-300'}`}>
              {s}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// TagInput — chips with autocomplete (for assignees)
// ═══════════════════════════════════════════════════════════════════════════
function TagInput({ values = [], onChange, suggestions = [], placeholder }) {
  const [draft, setDraft] = useState('');
  const [open, setOpen] = useState(false);
  const [highlight, setHighlight] = useState(0);
  const ref = useRef(null);
  const filtered = useMemo(() => {
    const q = draft.trim().toLowerCase();
    const base = suggestions.filter(s => s && !values.includes(s));
    if (!q) return base.slice(0, 8);
    return base.filter(s => s.toLowerCase().includes(q)).slice(0, 8);
  }, [draft, suggestions, values]);

  useEffect(() => {
    const onDoc = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  useEffect(() => { setHighlight(0); }, [draft]);

  const commit = (raw) => {
    const v = raw.trim();
    if (!v || values.includes(v)) { setDraft(''); return; }
    onChange([...values, v]);
    setDraft('');
  };
  const remove = (v) => onChange(values.filter(x => x !== v));

  const onKey = (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const pick = open && filtered[highlight] ? filtered[highlight] : draft;
      commit(pick);
    } else if (e.key === 'Backspace' && !draft && values.length) {
      remove(values[values.length - 1]);
    } else if (open && filtered.length) {
      if (e.key === 'ArrowDown') { e.preventDefault(); setHighlight(h => (h+1) % filtered.length); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setHighlight(h => (h-1+filtered.length) % filtered.length); }
      else if (e.key === 'Escape') { setOpen(false); }
    }
  };

  return (
    <div ref={ref} className="relative">
      <div className="flex flex-wrap items-center gap-1 bg-zinc-900/60 border border-zinc-800 rounded-md px-2 py-1.5 focus-within:shadow-[0_0_0_2px_#0a0a0b,0_0_0_4px_rgba(129,140,248,.45)]">
        {values.map(v => (
          <span key={v} className="inline-flex items-center gap-1 rounded bg-zinc-800 border border-zinc-700/60 text-[11.5px] text-zinc-200 pl-1.5 pr-1 py-0.5">
            <AvatarDot name={v} size={4}/>
            <span>{v}</span>
            <button type="button" onClick={() => remove(v)} className="text-zinc-500 hover:text-red-400 -mr-0.5"><Icon d={I.x} className="w-3 h-3"/></button>
          </span>
        ))}
        <input
          value={draft}
          onChange={e => { setDraft(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          onBlur={() => { if (draft.trim()) commit(draft); }}
          onKeyDown={onKey}
          placeholder={values.length ? '' : placeholder}
          className="flex-1 min-w-[80px] bg-transparent text-sm text-zinc-100 placeholder:text-zinc-600 outline-none px-1 py-0.5"
        />
      </div>
      {open && filtered.length > 0 && (
        <div className="absolute left-0 right-0 top-full mt-1 z-30 bg-zinc-950 border border-zinc-800 rounded-md shadow-xl py-1 max-h-56 overflow-y-auto anim-up">
          {filtered.map((s, i) => (
            <button key={s} type="button" onMouseDown={(e) => { e.preventDefault(); commit(s); }}
              onMouseEnter={() => setHighlight(i)}
              className={`w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 ${i === highlight ? 'bg-zinc-900 text-indigo-300' : 'text-zinc-300'}`}>
              <AvatarDot name={s} size={5}/>{s}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Avatar bits
// ═══════════════════════════════════════════════════════════════════════════
function hueFromName(name) { let h=0; for (let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))%360; return h; }
function initialsOf(name) { return name.trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase() || '·'; }
function AvatarDot({ name, size = 5 }) {
  const h = hueFromName(name);
  const px = size * 4;
  return <span className="inline-flex items-center justify-center rounded-full text-[9px] font-semibold text-zinc-50"
    style={{ width: px, height: px, background: `oklch(0.45 0.09 ${h})`, boxShadow:'inset 0 0 0 1px rgba(255,255,255,0.08)' }}>{initialsOf(name)}</span>;
}
function AssigneeStack({ names = [], max = 3 }) {
  if (!names.length) return null;
  const shown = names.slice(0, max);
  const rest = names.length - shown.length;
  return (
    <div className="inline-flex items-center">
      <div className="flex -space-x-1.5">
        {shown.map(n => (
          <span key={n} title={n} className="inline-flex items-center justify-center w-5 h-5 rounded-full text-[9px] font-semibold text-zinc-50 border border-zinc-950"
            style={{ background: `oklch(0.45 0.09 ${hueFromName(n)})` }}>{initialsOf(n)}</span>
        ))}
        {rest > 0 && (
          <span title={names.slice(max).join(', ')} className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-zinc-800 border border-zinc-950 text-[9px] font-medium text-zinc-300">+{rest}</span>
        )}
      </div>
      {names.length === 1 && <span className="ml-1.5 text-[11px] text-zinc-300 truncate max-w-[80px]">{names[0]}</span>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Chips
// ═══════════════════════════════════════════════════════════════════════════
const TypeChip = ({ type, size = 'md' }) => {
  const t = TYPES[type] || TYPES.task;
  const s = size === 'sm' ? 'text-[10px] px-1.5 py-0.5' : 'text-[11px] px-2 py-0.5';
  return <span className={`inline-flex items-center gap-1 rounded-md border ${t.bg} ${t.bd} ${t.fg} ${s} font-medium`}><span>{t.icon}</span><span>{t.label}</span></span>;
};
const PriorityChip = ({ priority }) => {
  const p = PRIORITIES[priority] || PRIORITIES.medium;
  return <span className={`inline-flex items-center gap-1.5 rounded-md border ${p.bg} ${p.bd} ${p.text} text-[11px] px-2 py-0.5 font-medium`}>
    <span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}></span>{p.label}</span>;
};
const SizeChip = ({ size }) => size ? <span className="mono text-[10px] font-medium text-zinc-400 bg-zinc-800/80 border border-zinc-700/60 rounded px-1.5 py-0.5">{size}</span> : null;

// ═══════════════════════════════════════════════════════════════════════════
// Card
// ═══════════════════════════════════════════════════════════════════════════
function Card({ card, onOpen, onMove, onArchive, onDelete, dragHandlers, isDragging, columnIndex, allowMoveLeft, allowMoveRight }) {
  const checklistDone = card.checklist?.filter(c => c.done).length || 0;
  const checklistTotal = card.checklist?.length || 0;
  const overdue = card.dueDate && card.column !== 'done' && new Date(card.dueDate).getTime() < Date.now() - 86400000;
  const dueSoon = card.dueDate && !overdue && card.column !== 'done' && new Date(card.dueDate).getTime() < Date.now() + 86400000*3;

  return (
    <div draggable {...dragHandlers} onClick={() => onOpen(card)}
      className={`card group relative bg-zinc-900/80 border border-zinc-800 rounded-lg p-3 cursor-pointer select-none anim-up ${isDragging ? 'card-dragging' : ''}`}>
      <div className="absolute left-0 top-0 bottom-0 w-[3px] rounded-l-lg" style={{ background: TYPES[card.type]?.strip || '#71717a' }}/>

      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="flex items-center gap-1.5 flex-wrap">
          <TypeChip type={card.type} size="sm" />
          {card.module && (
            <span className="inline-flex items-center gap-1 text-[10px] text-zinc-400 bg-zinc-800/60 border border-zinc-800 rounded px-1.5 py-0.5">
              <Icon d={I.layers} className="w-2.5 h-2.5" />{card.module}
            </span>
          )}
        </div>
        <button onClick={(e) => { e.stopPropagation(); card.column === 'done' ? onArchive(card.id) : onDelete(card.id); }}
          className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 transition-opacity p-1 -m-1"
          title={card.column === 'done' ? 'Archivar' : 'Eliminar'}>
          <Icon d={card.column === 'done' ? I.archive : I.trash} className="w-3.5 h-3.5"/>
        </button>
      </div>

      <h4 className="text-[13.5px] font-medium text-zinc-100 leading-snug mb-2 text-balance">{card.title}</h4>
      {card.description && <p className="text-[12px] text-zinc-400 leading-snug mb-2 line-clamp-2">{card.description}</p>}

      <div className="flex items-center gap-1.5 flex-wrap mb-2.5">
        <PriorityChip priority={card.priority} />
        <SizeChip size={card.size} />
        {card.version && (
          <span className="mono text-[10px] text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 rounded px-1.5 py-0.5">{card.version}</span>
        )}
      </div>

      <div className="flex items-center justify-between gap-2 text-[11px] text-zinc-500 pt-2 border-t border-zinc-800/80">
        <div className="flex items-center gap-2.5">
          {checklistTotal > 0 && (
            <span className={`inline-flex items-center gap-1 ${checklistDone === checklistTotal ? 'text-emerald-400' : ''}`} title="Checklist">
              <Icon d={I.list} className="w-3 h-3"/>{checklistDone}/{checklistTotal}
            </span>
          )}
          {card.comments?.length > 0 && <span className="inline-flex items-center gap-1" title="Comentarios"><Icon d={I.chat} className="w-3 h-3"/>{card.comments.length}</span>}
          {card.links?.length > 0 && <span className="inline-flex items-center gap-1" title="Links"><Icon d={I.link} className="w-3 h-3"/>{card.links.length}</span>}
          {card.dueDate && (
            <span className={`inline-flex items-center gap-1 ${overdue ? 'text-red-400' : dueSoon ? 'text-amber-300' : 'text-zinc-500'}`} title="Fecha límite">
              <Icon d={I.calendar} className="w-3 h-3"/>{formatShortDate(card.dueDate)}
            </span>
          )}
        </div>
        <AssigneeStack names={card.assignees} max={3}/>
      </div>

      <div className="opacity-0 group-hover:opacity-100 transition-opacity absolute -bottom-2.5 right-2 flex bg-zinc-950 border border-zinc-800 rounded-md shadow-lg">
        <button onClick={(e) => { e.stopPropagation(); onMove(card.id, -1); }} disabled={!allowMoveLeft}
          className="p-1 text-zinc-400 hover:text-indigo-300 hover:bg-zinc-800 rounded-l-md disabled:opacity-30 disabled:hover:bg-transparent" title="Mover izquierda">
          <Icon d={I.arrowL} className="w-3.5 h-3.5"/>
        </button>
        <div className="w-px bg-zinc-800"></div>
        <button onClick={(e) => { e.stopPropagation(); onMove(card.id, 1); }} disabled={!allowMoveRight}
          className="p-1 text-zinc-400 hover:text-indigo-300 hover:bg-zinc-800 rounded-r-md disabled:opacity-30 disabled:hover:bg-transparent" title="Mover derecha">
          <Icon d={I.arrowR} className="w-3.5 h-3.5"/>
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Column info popover
// ═══════════════════════════════════════════════════════════════════════════
function InfoButton({ text }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const onDoc = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  return (
    <div ref={ref} className="relative">
      <button onClick={() => setOpen(o => !o)}
        className={`p-1 rounded transition-colors ${open ? 'bg-zinc-800 text-indigo-300' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900'}`}
        title="Propósito de la columna">
        <Icon d={I.info} className="w-3.5 h-3.5"/>
      </button>
      {open && (
        <div className="absolute left-0 top-full mt-1.5 z-30 w-64 bg-zinc-950 border border-zinc-800 rounded-md shadow-xl p-3 anim-up">
          <p className="text-[12px] text-zinc-300 leading-snug">{text}</p>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Column
// ═══════════════════════════════════════════════════════════════════════════
function Column({ col, cards, onAdd, onOpen, onMove, onDelete, onArchive, dragState, onDragOver, onDrop, onDragStart, onDragEnd, columnIndex }) {
  const isOver = dragState.overCol === col.id;
  const isBugs = col.id === 'bugs';
  return (
    <div className={`flex flex-col min-w-[300px] w-[300px] bg-zinc-950/40 border ${isBugs ? 'border-rose-500/15 bugs-col' : 'border-zinc-900'} rounded-xl ${isOver ? 'col-drag-over' : ''}`}
      onDragOver={(e) => { e.preventDefault(); onDragOver(col.id); }}
      onDrop={(e) => { e.preventDefault(); onDrop(col.id); }}>
      <div className="flex items-center justify-between px-3 py-2.5 border-b border-zinc-900">
        <div className="flex items-center gap-2 min-w-0">
          {isBugs ? <Icon d={I.bug} className="w-3.5 h-3.5 text-rose-400 shrink-0"/> : <span className="w-2 h-2 rounded-full shrink-0" style={{ background: col.dot }}></span>}
          <h3 className={`text-[13px] font-semibold tracking-tight truncate ${isBugs ? 'text-rose-200' : 'text-zinc-200'}`}>{col.title}</h3>
          <span className="mono text-[11px] text-zinc-500 bg-zinc-900 border border-zinc-800 rounded px-1.5 py-0.5 shrink-0">{cards.length}</span>
          <InfoButton text={col.info}/>
        </div>
        <button onClick={() => onAdd(col.id)} className="text-zinc-500 hover:text-indigo-300 hover:bg-zinc-900 rounded p-1 transition-colors" title="Nueva tarjeta">
          <Icon d={I.plus} className="w-4 h-4"/>
        </button>
      </div>

      <div className="flex-1 overflow-y-auto p-2 space-y-2 min-h-[200px]">
        {cards.length === 0 && <div className="text-center py-8 px-4"><p className="text-[11px] text-zinc-600 mono">vacío</p></div>}
        {cards.map(card => {
          const flowIdx = FLOW_COLUMNS.indexOf(card.column);
          const allowL = isBugs ? false : flowIdx > 0;
          const allowR = isBugs ? false : flowIdx >= 0 && flowIdx < FLOW_COLUMNS.length - 1;
          return (
            <Card key={card.id} card={card} columnIndex={columnIndex}
              onOpen={onOpen} onMove={onMove} onDelete={onDelete} onArchive={onArchive}
              isDragging={dragState.id === card.id}
              allowMoveLeft={allowL} allowMoveRight={allowR}
              dragHandlers={{
                onDragStart: (e) => { e.dataTransfer.effectAllowed = 'move'; onDragStart(card.id); },
                onDragEnd: onDragEnd,
              }}/>
          );
        })}
      </div>

      <button onClick={() => onAdd(col.id)}
        className="m-2 mt-0 px-3 py-2 text-[12px] text-zinc-500 hover:text-indigo-300 hover:bg-zinc-900 border border-dashed border-zinc-800 hover:border-indigo-500/30 rounded-md transition-colors flex items-center justify-center gap-1.5">
        <Icon d={I.plus} className="w-3.5 h-3.5"/> Añadir tarjeta
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Editor modal
// ═══════════════════════════════════════════════════════════════════════════
function Editor({ card, suggestions, onClose, onSave, onArchive, onDelete }) {
  const [draft, setDraft] = useState(card);
  const [commentText, setCommentText] = useState('');
  const [commentAuthor, setCommentAuthor] = useState(localStorage.getItem(ME_KEY) || '');
  const [newCheck, setNewCheck] = useState('');
  const titleRef = useRef(null);
  const isNew = card.__isNew;

  useEffect(() => {
    if (isNew) titleRef.current?.focus();
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) doSave();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const update = (patch) => setDraft(d => ({ ...d, ...patch }));
  const doSave = () => { if (!draft.title.trim()) { titleRef.current?.focus(); return; } onSave(draft); };

  const addCheck = () => { if (!newCheck.trim()) return; update({ checklist:[...(draft.checklist||[]), { id: uid(), text: newCheck.trim(), done: false }] }); setNewCheck(''); };
  const toggleCheck = (id) => update({ checklist: draft.checklist.map(c => c.id === id ? { ...c, done: !c.done } : c) });
  const delCheck = (id) => update({ checklist: draft.checklist.filter(c => c.id !== id) });

  const addComment = () => {
    if (!commentText.trim()) return;
    const author = commentAuthor.trim() || 'Yo';
    localStorage.setItem(ME_KEY, author);
    update({ comments:[...(draft.comments||[]), { id: uid(), author, text: commentText.trim(), at: Date.now() }] });
    setCommentText('');
  };
  const delComment = (id) => update({ comments: draft.comments.filter(c => c.id !== id) });

  const addLink = () => update({ links:[...(draft.links||[]), { label:'', url:'' }] });
  const updLink = (i, patch) => update({ links: draft.links.map((l, idx) => idx === i ? { ...l, ...patch } : l) });
  const delLink = (i) => update({ links: draft.links.filter((_, idx) => idx !== i) });

  const checklistDone = draft.checklist?.filter(c => c.done).length || 0;
  const checklistTotal = draft.checklist?.length || 0;

  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto p-4 sm:p-8 bg-black/60 backdrop-blur-sm anim-fade" onClick={onClose}>
      <div className="bg-zinc-950 border border-zinc-800 rounded-xl shadow-2xl w-full max-w-3xl my-auto anim-pop" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-3 border-b border-zinc-900">
          <div className="flex items-center gap-2 text-xs text-zinc-500">
            <span className="mono">{isNew ? 'Nueva tarjeta' : 'Editando'}</span>
            <span className="text-zinc-700">·</span>
            <span>{COLUMNS.find(c => c.id === draft.column)?.title}</span>
            {!isNew && <><span className="text-zinc-700">·</span><span>creado {formatRelative(draft.createdAt)}</span></>}
            {draft.archived && <><span className="text-zinc-700">·</span><span className="text-amber-300">archivada</span></>}
          </div>
          <button onClick={onClose} className="text-zinc-500 hover:text-zinc-200 p-1"><Icon d={I.x} className="w-4 h-4"/></button>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-[1fr_240px]">
          <div className="p-5 space-y-5">
            <input ref={titleRef} value={draft.title} onChange={e => update({ title: e.target.value })}
              placeholder="Título de la tarjeta"
              className="w-full bg-transparent border-0 outline-none text-xl font-semibold text-zinc-100 placeholder:text-zinc-700 ring-focus rounded px-1 -ml-1"/>

            <Field label="Descripción">
              <TextArea value={draft.description} onChange={e => update({ description: e.target.value })}
                placeholder="Contexto, pasos de reproducción, criterios de aceptación…" rows={4}/>
            </Field>

            <div>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2"><Icon d={I.list} className="w-4 h-4 text-zinc-500"/><span className="text-[11px] uppercase tracking-wider text-zinc-500 font-medium">Checklist</span></div>
                {checklistTotal > 0 && <span className="mono text-[11px] text-zinc-500">{checklistDone}/{checklistTotal}</span>}
              </div>
              {checklistTotal > 0 && (
                <div className="mb-2 h-1 bg-zinc-900 rounded-full overflow-hidden">
                  <div className="h-full bg-emerald-500/70 transition-all" style={{ width: `${(checklistDone/checklistTotal)*100}%` }}/>
                </div>
              )}
              <div className="space-y-1.5">
                {(draft.checklist||[]).map(item => (
                  <div key={item.id} className="group flex items-center gap-2 px-2 py-1 rounded-md hover:bg-zinc-900/50">
                    <button onClick={() => toggleCheck(item.id)} className={`shrink-0 w-4 h-4 rounded border flex items-center justify-center transition-colors ${item.done ? 'bg-emerald-500 border-emerald-500' : 'border-zinc-700 hover:border-zinc-500'}`}>
                      {item.done && <Icon d={I.check} className="w-3 h-3 text-white"/>}
                    </button>
                    <span className={`flex-1 text-sm ${item.done ? 'text-zinc-500 line-through' : 'text-zinc-200'}`}>{item.text}</span>
                    <button onClick={() => delCheck(item.id)} className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 p-0.5"><Icon d={I.x} className="w-3 h-3"/></button>
                  </div>
                ))}
              </div>
              <div className="flex gap-2 mt-2">
                <Input value={newCheck} onChange={e => setNewCheck(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCheck(); } }}
                  placeholder="Añadir paso…" className="text-sm"/>
                <Btn onClick={addCheck} variant="soft" size="sm">Añadir</Btn>
              </div>
            </div>

            <div>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2"><Icon d={I.link} className="w-4 h-4 text-zinc-500"/><span className="text-[11px] uppercase tracking-wider text-zinc-500 font-medium">Adjuntos / Links</span></div>
                <button onClick={addLink} className="text-[11px] text-indigo-400 hover:text-indigo-300 inline-flex items-center gap-1"><Icon d={I.plus} className="w-3 h-3"/>añadir</button>
              </div>
              <div className="space-y-1.5">
                {(draft.links||[]).map((link, i) => (
                  <div key={i} className="flex items-center gap-1.5">
                    <Input value={link.label} onChange={e => updLink(i, { label: e.target.value })} placeholder="Figma, Loom…" className="w-32 text-xs"/>
                    <Input value={link.url} onChange={e => updLink(i, { url: e.target.value })} placeholder="https://…" className="flex-1 text-xs mono"/>
                    <button onClick={() => delLink(i)} className="text-zinc-500 hover:text-red-400 p-1"><Icon d={I.x} className="w-3.5 h-3.5"/></button>
                  </div>
                ))}
                {(draft.links||[]).length === 0 && <p className="text-[11px] text-zinc-600 italic">Sin links · solo URLs (Figma, Loom, docs)</p>}
              </div>
            </div>

            <div>
              <div className="flex items-center gap-2 mb-2">
                <Icon d={I.chat} className="w-4 h-4 text-zinc-500"/>
                <span className="text-[11px] uppercase tracking-wider text-zinc-500 font-medium">Comentarios</span>
                {(draft.comments||[]).length > 0 && <span className="mono text-[11px] text-zinc-500">· {draft.comments.length}</span>}
              </div>
              <div className="space-y-2 mb-3">
                {(draft.comments||[]).map(c => (
                  <div key={c.id} className="group flex gap-2.5 text-sm">
                    <span className="inline-flex items-center gap-1.5 text-[11px] text-zinc-300 shrink-0">
                      <AvatarDot name={c.author}/>{c.author}
                    </span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-baseline justify-between gap-2">
                        <span className="text-[10px] text-zinc-500 mono">{formatRelative(c.at)}</span>
                        <button onClick={() => delComment(c.id)} className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-red-400 text-[10px]">eliminar</button>
                      </div>
                      <p className="text-[13px] text-zinc-300 leading-snug mt-0.5 whitespace-pre-wrap break-words">{c.text}</p>
                    </div>
                  </div>
                ))}
              </div>
              <div className="bg-zinc-900/50 border border-zinc-800 rounded-md p-2 space-y-2">
                <div className="flex gap-2">
                  <input value={commentAuthor} onChange={e => setCommentAuthor(e.target.value)} placeholder="Quién eres"
                    className="w-24 bg-transparent text-[11px] text-zinc-300 placeholder:text-zinc-600 border-b border-zinc-800 px-1 py-1 ring-focus"/>
                  <span className="text-[11px] text-zinc-600 self-end pb-1">· comentando</span>
                </div>
                <TextArea value={commentText} onChange={e => setCommentText(e.target.value)}
                  placeholder="Escribe un comentario…" rows={2}
                  className="border-0 bg-transparent text-sm"
                  onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) addComment(); }}/>
                <div className="flex justify-end"><Btn onClick={addComment} variant="primary" size="sm" disabled={!commentText.trim()}>Comentar</Btn></div>
              </div>
            </div>
          </div>

          <div className="bg-zinc-950 md:border-l border-t md:border-t-0 border-zinc-900 p-5 space-y-4">
            <Field label="Estado">
              <Select value={draft.column} onChange={e => update({ column: e.target.value })}>
                {COLUMNS.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}
              </Select>
            </Field>
            <Field label="Tipo">
              <Select value={draft.type} onChange={e => update({ type: e.target.value })}>
                {Object.entries(TYPES).map(([id, t]) => <option key={id} value={id}>{t.icon} {t.label}</option>)}
              </Select>
            </Field>
            <Field label="Prioridad">
              <div className="grid grid-cols-3 gap-1">
                {Object.entries(PRIORITIES).map(([id, p]) => (
                  <button key={id} onClick={() => update({ priority: id })}
                    className={`flex items-center justify-center gap-1.5 px-2 py-1.5 rounded-md border text-xs transition-colors ${draft.priority === id ? `${p.bg} ${p.bd} ${p.text}` : 'border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-zinc-300'}`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}></span>{p.label}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Responsables" hint="múltiples">
              <TagInput values={draft.assignees || []} onChange={v => update({ assignees: v })}
                suggestions={suggestions.assignees} placeholder="David, Beatriz, Dev…"/>
            </Field>
            <Field label="Esfuerzo" hint="talla de camiseta">
              <div className="grid grid-cols-5 gap-1">
                {SIZES.map(s => (
                  <button key={s} onClick={() => update({ size: draft.size === s ? '' : s })}
                    className={`mono text-xs py-1.5 rounded border transition-colors ${draft.size === s ? 'bg-indigo-500/20 border-indigo-500/40 text-indigo-300' : 'border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-zinc-300'}`}>{s}</button>
                ))}
              </div>
            </Field>
            <Field label="Versión" hint="V3, v4.1…">
              <AutoInput value={draft.version} onChange={v => update({ version: v })}
                suggestions={suggestions.versions} placeholder="V4, v4.1…" mono/>
            </Field>
            <Field label="Módulo / área">
              <AutoInput value={draft.module} onChange={v => update({ module: v })}
                suggestions={suggestions.modules} placeholder="Simulaciones, LMS…"/>
            </Field>
            <Field label="Fecha límite" hint="opcional">
              <Input type="date" value={draft.dueDate || ''} onChange={e => update({ dueDate: e.target.value })} className="mono"/>
            </Field>
          </div>
        </div>

        <div className="flex items-center justify-between px-5 py-3 border-t border-zinc-900 bg-zinc-950/50 rounded-b-xl">
          <div className="flex items-center gap-2">
            {!isNew && !draft.archived && (
              <Btn variant="outline" size="sm" onClick={() => { if (confirm('¿Archivar esta tarjeta? Quedará en el histórico.')) onArchive(draft.id); }}>
                <Icon d={I.archive} className="w-3.5 h-3.5"/> Archivar
              </Btn>
            )}
            {!isNew && (
              <Btn variant="danger" size="sm" onClick={() => { if (confirm('¿Eliminar permanentemente esta tarjeta?')) onDelete(draft.id); }}>
                <Icon d={I.trash} className="w-3.5 h-3.5"/> Eliminar
              </Btn>
            )}
          </div>
          <div className="flex items-center gap-2">
            <span className="text-[10px] text-zinc-600 mono mr-2 hidden sm:inline">⌘+Enter para guardar</span>
            <Btn variant="ghost" size="md" onClick={onClose}>Cancelar</Btn>
            <Btn variant="primary" size="md" onClick={doSave}>Guardar</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function formatShortDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('es-ES', { day:'2-digit', month:'short' }); }
function formatRelative(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const m=60_000, h=60*m, day=24*h;
  if (diff < m) return 'ahora';
  if (diff < h) return `hace ${Math.floor(diff/m)} min`;
  if (diff < day) return `hace ${Math.floor(diff/h)} h`;
  if (diff < 7*day) return `hace ${Math.floor(diff/day)} d`;
  return new Date(ts).toLocaleDateString('es-ES', { day:'2-digit', month:'short' });
}

function Dropdown({ label, active, icon, children }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const onDoc = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  return (
    <div ref={ref} className="relative">
      <button onClick={() => setOpen(o => !o)}
        className={`inline-flex items-center gap-1.5 text-xs px-2.5 py-1.5 rounded-md border transition-colors ${active ? 'bg-indigo-500/10 border-indigo-500/30 text-indigo-300' : 'bg-zinc-900/60 border-zinc-800 text-zinc-300 hover:border-zinc-700'}`}>
        {icon && <Icon d={icon} className="w-3 h-3"/>}{label}<Icon d="M6 9l6 6 6-6" className="w-3 h-3 opacity-60"/>
      </button>
      {open && <div className="absolute z-30 left-0 mt-1 min-w-[180px] max-h-72 overflow-y-auto bg-zinc-950 border border-zinc-800 rounded-md shadow-xl py-1 anim-up">{children}</div>}
    </div>
  );
}
function DropItem({ children, selected, onClick }) {
  return (
    <button onClick={onClick} className={`w-full text-left px-3 py-1.5 text-xs flex items-center justify-between hover:bg-zinc-900 ${selected ? 'text-indigo-300' : 'text-zinc-300'}`}>
      <span className="inline-flex items-center">{children}</span>
      {selected && <Icon d={I.check} className="w-3 h-3"/>}

  );
}

// ═══════════════════════════════════════════════════════════════════════════
// App
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [cards, setCards] = useState(loadState);
  const [editing, setEditing] = useState(null);
  const [activity, setActivity] = useState(loadActivity);
  const [showActivity, setShowActivity] = useState(false);
  const [showArchive, setShowArchive] = useState(false);
  const [me, setMe] = useState(localStorage.getItem(ME_KEY) || '');
  const [filters, setFilters] = useState({ search:'', assignee:'', types:[], priority:'', version:'', module:'' });
  const [drag, setDrag] = useState({ id:null, overCol:null });

  useEffect(() => { save(cards); }, [cards]);
  useEffect(() => { saveActivity(activity); }, [activity]);

  // Suggestions for autocomplete (build from all cards, archived included)
  const suggestions = useMemo(() => {
    const asSet = new Set(), vSet = new Set(), mSet = new Set();
    for (const c of cards) {
      (c.assignees || []).forEach(a => a && asSet.add(a));
      if (c.version) vSet.add(c.version);
      if (c.module) mSet.add(c.module);
    }
    const sortVersions = (arr) => arr.sort((a, b) => {
      const pa = a.replace(/^v/i,'').split('.').map(Number);
      const pb = b.replace(/^v/i,'').split('.').map(Number);
      for (let i=0;i<Math.max(pa.length,pb.length);i++) {
        if ((pa[i]||0) !== (pb[i]||0)) return (pa[i]||0) - (pb[i]||0);
      }
      return 0;
    });
    return {
      assignees: [...asSet].sort((a,b) => a.localeCompare(b, 'es')),
      versions: sortVersions([...vSet]),
      modules: [...mSet].sort((a,b) => a.localeCompare(b, 'es')),
    };
  }, [cards]);

  const visibleCards = useMemo(() => cards.filter(c => !c.archived), [cards]);

  const filtered = useMemo(() => visibleCards.filter(c => {
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const blob = `${c.title} ${c.description} ${(c.assignees||[]).join(' ')} ${c.module} ${c.version}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    if (filters.assignee && !(c.assignees||[]).includes(filters.assignee)) return false;
    if (filters.types.length && !filters.types.includes(c.type)) return false;
    if (filters.priority && c.priority !== filters.priority) return false;
    if (filters.version && c.version !== filters.version) return false;
    if (filters.module && c.module !== filters.module) return false;
    return true;
  }), [visibleCards, filters]);

  const cardsByCol = useMemo(() => {
    const m = Object.fromEntries(COLUMNS.map(c => [c.id, []]));
    for (const c of filtered) (m[c.column] || m.defined).push(c);
    return m;
  }, [filtered]);

  const logEvent = (entry) => setActivity(a => [{ id: uid(), at: Date.now(), who: me || (localStorage.getItem(ME_KEY) || ''), ...entry }, ...a]);

  const addCard = (columnId) => {
    setEditing({
      id: uid(), column: columnId, title:'', description:'',
      type: columnId === 'bugs' ? 'bug' : 'task',
      priority:'medium', assignees:[], size:'', version:'', module:'',
      dueDate:'', links:[], checklist:[], comments:[],
      createdAt: Date.now(), archived: false, archivedAt: null,
      __isNew: true,
    });
  };

  const saveCard = (draft) => {
    const { __isNew, ...clean } = draft;
    const colTitle = (id) => COLUMNS.find(c => c.id === id)?.title || id;
    setCards(prev => {
      if (__isNew) {
        logEvent({ action:'create', cardId: clean.id, cardTitle: clean.title, toTitle: colTitle(clean.column) });
        return [clean, ...prev];
      }
      const before = prev.find(c => c.id === clean.id);
      if (before && before.column !== clean.column) {
        logEvent({ action:'move', cardId: clean.id, cardTitle: clean.title,
          from: before.column, to: clean.column, fromTitle: colTitle(before.column), toTitle: colTitle(clean.column) });
      }
      return prev.map(c => c.id === clean.id ? clean : c);
    });
    setEditing(null);
  };

  const deleteCard = (id) => {
    setCards(prev => {
      const c = prev.find(x => x.id === id);
      if (c) logEvent({ action:'delete', cardId: id, cardTitle: c.title });
      return prev.filter(x => x.id !== id);
    });
    setEditing(null);
  };
  const archiveCard = (id) => {
    setCards(prev => prev.map(c => {
      if (c.id !== id) return c;
      logEvent({ action:'archive', cardId: id, cardTitle: c.title });
      return { ...c, archived: true, archivedAt: Date.now() };
    }));
    setEditing(null);
  };
  const restoreCard = (id) => {
    setCards(prev => prev.map(c => {
      if (c.id !== id) return c;
      logEvent({ action:'restore', cardId: id, cardTitle: c.title });
      return { ...c, archived: false, archivedAt: null, column: c.column === 'bugs' ? 'bugs' : 'done' };
    }));
  };

  const moveCard = (id, delta) => {
    setCards(prev => prev.map(c => {
      if (c.id !== id) return c;
      if (c.column === 'bugs') return c; // bugs column doesn't flow
      const idx = FLOW_COLUMNS.indexOf(c.column);
      if (idx < 0) return c;
      const next = Math.max(0, Math.min(FLOW_COLUMNS.length - 1, idx + delta));
      if (FLOW_COLUMNS[next] === c.column) return c;
      const colTitle = (id) => COLUMNS.find(x => x.id === id)?.title || id;
      logEvent({ action:'move', cardId: c.id, cardTitle: c.title,
        from: c.column, to: FLOW_COLUMNS[next], fromTitle: colTitle(c.column), toTitle: colTitle(FLOW_COLUMNS[next]) });
      return { ...c, column: FLOW_COLUMNS[next] };
    }));
  };

  const onDragStart = (id) => setDrag({ id, overCol:null });
  const onDragOver = (colId) => setDrag(d => d.overCol === colId ? d : { ...d, overCol: colId });
  const onDragEnd = () => setDrag({ id:null, overCol:null });
  const onDrop = (colId) => {
    if (drag.id) {
      setCards(prev => prev.map(c => {
        if (c.id !== drag.id) return c;
        if (c.column === colId) return c;
        const colTitle = (id) => COLUMNS.find(x => x.id === id)?.title || id;
        logEvent({ action:'move', cardId: c.id, cardTitle: c.title,
          from: c.column, to: colId, fromTitle: colTitle(c.column), toTitle: colTitle(colId) });
        return { ...c, column: colId };
      }));
    }
    setDrag({ id:null, overCol:null });
  };

  const totals = useMemo(() => ({
    total: visibleCards.length,
    active: visibleCards.filter(c => c.column !== 'done').length,
    bugs: visibleCards.filter(c => c.column === 'bugs').length,
    overdue: visibleCards.filter(c => c.dueDate && c.column !== 'done' && new Date(c.dueDate).getTime() < Date.now() - 86400000).length,
    archived: cards.filter(c => c.archived).length,
  }), [cards, visibleCards]);

  const onMeChange = (v) => { setMe(v); localStorage.setItem(ME_KEY, v); };

  return (
    <div className="min-h-screen flex flex-col">
      <header className="border-b border-zinc-900 bg-zinc-950/80 backdrop-blur sticky top-0 z-20">
        <div className="px-5 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-sm shadow-indigo-500/30">
              <svg viewBox="0 0 24 24" className="w-4 h-4 text-white" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M6 4v16M14 4v10M18 4v16M10 4v6"/></svg>
            </div>
            <div>
              <h1 className="text-sm font-semibold text-zinc-100 tracking-tight leading-none">Task Manager</h1>
              <p className="text-[11px] text-zinc-500 mt-0.5 leading-none">Producto &amp; Desarrollo · MetaMedics</p>
            </div>
          </div>
          <div className="flex items-center gap-4 text-[11px] text-zinc-500 flex-wrap">
            <Stat label="Total" value={totals.total}/>
            <Stat label="Activas" value={totals.active}/>
            <Stat label="Bugs" value={totals.bugs} accent={totals.bugs > 0 ? 'text-rose-300' : ''}/>
            <Stat label="Vencidas" value={totals.overdue} accent={totals.overdue > 0 ? 'text-red-300' : ''}/>
            <Stat label="Archivadas" value={totals.archived}/>
            <div className="flex items-center gap-1.5">
              <span className="w-px h-4 bg-zinc-800"></span>
              <input value={me} onChange={e => onMeChange(e.target.value)} placeholder="Soy…"
                className="w-24 bg-zinc-900/60 border border-zinc-800 rounded px-2 py-1 text-[11px] text-zinc-200 placeholder:text-zinc-600 ring-focus" title="Tu identidad para el log de actividad"/>
            </div>
          </div>
        </div>
        <div className="px-5 pb-3 flex items-center justify-between gap-3 flex-wrap">
          <FilterBar suggestions={suggestions} filters={filters} setFilters={setFilters}/>
          <div className="flex items-center gap-2">
            <Btn variant="outline" size="md" onClick={() => setShowActivity(true)} title="Log de actividad">
              <Icon d={I.history} className="w-4 h-4"/><span className="hidden sm:inline">Actividad</span>
            </Btn>
            <Btn variant="outline" size="md" onClick={() => setShowArchive(true)} title="Archivo">
              <Icon d={I.archive} className="w-4 h-4"/><span className="hidden sm:inline">Archivo</span>
              {totals.archived > 0 && <span className="mono text-[10px] bg-zinc-800 rounded px-1 ml-0.5">{totals.archived}</span>}
            </Btn>
            <Btn variant="primary" size="md" onClick={() => addCard('defined')}>
              <Icon d={I.plus} className="w-4 h-4"/> Nueva tarjeta
            </Btn>
          </div>
        </div>
      </header>

      <main className="flex-1 overflow-x-auto p-5">
        <div className="flex gap-4 h-full min-h-[600px]">
          {COLUMNS.map((col, idx) => (
            <Column key={col.id} col={col} columnIndex={idx}
              cards={cardsByCol[col.id] || []}
              onAdd={addCard} onOpen={setEditing} onMove={moveCard}
              onDelete={deleteCard} onArchive={archiveCard}
              dragState={drag} onDragStart={onDragStart} onDragOver={onDragOver} onDragEnd={onDragEnd} onDrop={onDrop}/>
          ))}
        </div>
      </main>

      <footer className="border-t border-zinc-900 px-5 py-2 text-[10px] text-zinc-600 mono flex justify-between">
        <span>local · {visibleCards.length} activas · {totals.archived} archivadas</span>
        <span>drag &amp; drop · ↑↓ mover · clic para editar</span>
      </footer>

      {editing && (
        <Editor card={editing} suggestions={suggestions}
          onClose={() => setEditing(null)} onSave={saveCard}
          onArchive={archiveCard} onDelete={deleteCard}/>
      )}
      {showActivity && <ActivityPanel activity={activity} onClose={() => setShowActivity(false)}/>}
      {showArchive && <ArchivePanel cards={cards} onRestore={restoreCard} onDelete={deleteCard} onOpen={(c) => { setShowArchive(false); setEditing(c); }} onClose={() => setShowArchive(false)}/>}
    </div>
  );
}

function Stat({ label, value, accent }) {
  return (
    <div className="flex items-baseline gap-1.5">
      <span className={`mono text-sm font-semibold ${accent || 'text-zinc-200'}`}>{value}</span>
      <span className="text-[10px] uppercase tracking-wider text-zinc-500">{label}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
